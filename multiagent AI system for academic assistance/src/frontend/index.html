```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AI Learning Assistant</title>

  <!-- CSS Connection -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Main Container -->
  <div class="main-container">

    <!-- Header -->
    <header class="header">
      <h1>🤖 AI Learning Assistant</h1>
      <p>Learn Smarter with AI</p>
    </header>

    <!-- Welcome Message -->
    <div class="welcome-box">
      <h2>Welcome 👋</h2>

      <p>
        I can help you with:
      </p>

      <ul>
        <li>📚 Study Materials</li>
        <li>🧠 Quiz Preparation</li>
        <li>💻 Programming Doubts</li>
        <li>🤖 AI Concepts</li>
      </ul>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">

      <div id="chat-box">

        <!-- Sample Bot Message -->
        <div class="bot-message">
          Hello! Ask me anything related to your studies.
        </div>

      </div>

      <!-- Input Area -->
      <div class="input-area">

        <input 
          type="text" 
          id="user-input" 
          placeholder="Type your question here..."
          autocomplete="off"
        />

        <button id="send-btn">
          Send
        </button>

      </div>

    </div>

    <!-- Feature Buttons -->
    <div class="feature-buttons">

      <button class="feature-btn">
        📚 Study Material
      </button>

      <button class="feature-btn">
        🧠 Quiz
      </button>

      <button class="feature-btn">
        📜 History
      </button>

      <button class="feature-btn">
        ⚙️ Settings
      </button>

    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>AI Learning Assistant © 2026</p>
    </footer>

  </div>

  <!-- JavaScript Connection -->
  <script src="script.js"></script>

</body>
</html>
```
